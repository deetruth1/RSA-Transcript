 <section id="" class="relative px-4 lg:px-36 text-sm md:text-md lg:h-[90vh]">
   <h3 class="text-3xl text-center mt-20 font-bold p-4">ADD STUDENT PROFILE</h3>
   
    <!-- Student Info -->
  <div class="w-full py-4 lg:p-12 shadow-blue-600 backdrop-blur-md rounded-3xl shadow-sm shadow-blue-6 text-sm lg:text-xl bg-white/70 text-gray-800">
     <h1 class="text-center text-blue-500 text-2xl lg:text-4xl font-bold m-4">STUDENT BIO</h1>
   <form id="courseForm" class="p-4 space-y-4">
     
    <div class="grid grid-cols-3 gap-2 lg:gap-6">
    <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Surname</label>
      <input id="surname" type="text" placeholder="Surname"
        class="w-full shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required></div>
    
     <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">First Name</label>
      <input id="firstName" type="text" placeholder="First Name"
        class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5">
        </div>
        
      <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Other Name</label>
      <input id="otherName" type="text" placeholder="Other name"
        class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5">
        </div>
         </div>
   <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
   <div class="col-span-2 lg:col-span-1 flex flex-col">  <label class="block font-medium px-1.5 mb-1">Email</label>
      <input id="email" type="email" placeholder="Email"
        class="w-full shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required></div>      
   <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Student ID</label>
      <input id="studentId" type="text" placeholder="Student Id"
        class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5">
        </div>
        
    <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Year</label>
    <select id="session"  class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required>
    <option value="">Select Year</option>
    </select></div>
  
   <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Class</label>
    <select id="school" class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required>
        <option value="">Select Class</option>
        <option value="SS1">SS1</option>
        <option value="SS2">SS2</option>
        <option value="SS3">SS3</option>
      </select></div>
      
    <div class="flex flex-col">  <label class="block font-medium px-1.5 mb-1">Term</label>
      <select id="term" class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required>
      <option value="">Select Term</option>
        <option value="First Term">First Term</option>
        <option value="Second Term">Second Term</option>
        <option value="Third Term">Third Term</option>
      </select></div>
    </div>
      
     <!-- Subjects Form -->
     <h2 class="text-2xl lg:text-3xl mt-8 font-bold mb-4 text-center text-blue-500">SUBJECT RECORDS</h2>
     <div id="courseContainer" class="lg:grid lg:grid-cols-2 lg:gap-6"></div>
      <!-- Buttons -->
      <div class="grid grid-cols-4 gap-4">
        <button type="button" onclick="addRow()"
          class="shadow-sm shadow-blue-600 backdrop-blur-md bg-green-600 text-white mt-4 px-2 lg:py-2 rounded-lg hover:bg-blue-700 transition">Add row</button>
     <button type="button" id="toggleDeleteBtn" onclick="toggleDeleteMode()"  class="shadow-sm shadow-blue-600 backdrop-blur-md bg-red-600 text-white mt-4 px-2 lg:py-2 rounded-lg hover:bg-blue-700 transition">Delete</button>
        <button type="button" onclick="handlePreview()" class="shadow-sm shadow-blue-600 backdrop-blur-md bg-yellow-600 text-white mt-4 px-2 lg:py-2 rounded-lg hover:bg-blue-700 transition">Preview</button>
        <button type="submit" class="shadow-sm shadow-blue-600 backdrop-blur-md bg-blue-600 text-white mt-4 px-2 lg:py-2 rounded-lg hover:bg-blue-700 transition">Save</button>
        </form>
</section>

<!-- Result Table -->
 <section class="relative flex flex-col justify-center items-center p-4 lg:p-36 text-sm lg:text-2xl">
