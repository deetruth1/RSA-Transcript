<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="scroll-smooth flex flex-col min-h-screen bg-gradient-to-bl from-blue-350 via-blue-400 to-blue-500 text-slate-900">

<div id="bg" class="fixed inset-0 z-0 overflow-hidden">

  <!-- Gradient Layer (animated shift) -->
  <div class="absolute inset-0 bg-white/20 backdrop-blur-lg animate-[bgshift_12s_ease-in-out_infinite]"></div>

  <!-- Soft glow blobs -->
  <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-blue-400/30 blur-3xl rounded-full animate-pulse"></div>
  <div class="absolute bottom-0 -right-40 w-[600px] h-[600px] bg-indigo-400/20 blur-3xl rounded-full animate-pulse"></div>

  <!-- Floating particles -->
  <div class="particles absolute inset-0"></div>
</div>

<nav class="fixed top-0 w-full z-40">
  <div class="mx-auto flex justify-between items-center px-6 py-2 text-2xl border-b border-slate-800 bg-slate-900/90 backdrop-blur-md text-white">
    <h1 class="heading">LOGO</h1>
     <div class="flex items-center gap-4">
    <button id="menuBtn" class="px-2">☰</button>
  </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden fixed right-0 w-24 lg:w-40 shadow-md bg-white/30 backdrop-blur-md shadow-blue-900 rounded-b-lg text-center lg:text-4xl py-4 space-y-4 text-xl">
    <a href="/Aadmindash class="block text-md hover:text-white">Home</a>
    <a href="/profile" class="admin-only block text-md hover:text-white">Add</a>
    <a href="/edit" class="admin-only block text-md hover:text-white">Edit</a>
    <a href="/generate" class="block text-md hover:text-white">Generate</a>
    <a href="/request" class="block text-md hover:text-white">Requests</a>
    <a href="/sent" class="block text-md hover:text-white">Sent</a>
    <button onclick="logout()" class="text-md text-red-700 hover:text-white">Sign Out</button>   </div>
</nav>

 
 <section id="" class="relative px-4 lg:px-12">
   <h3 class="text-3xl lg:text-5xl text-center mt-20 font-bold p-2">EDIT PROFILE</h3>
   <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 text-sm lg:text-3xl mt-4">
    <!-- Student Info -->
  <div class="col-span-1 lg:h-32 shadow-blue-300 bg-white backdrop-blur-md rounded-2xl shadow-sm p-2">
     <h1 class="text-2xl lg:text-3xl font-bold px-4 lg:mt-2">Search Result</h1>
     <div class="flex justify-between gap-2 px-2 mt-2 mb-1">
      <input id="studentId" name="studentId" type="text" 
        placeholder="Enter Student Id"
        class="lg:w-full shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg 
        focus:ring-blue-500 focus:border-blue-500 px-2 py-1.5">
     
   <button type="button" onclick="filterResults(), openRecord('${key}')" class="w-24 shadow-sm shadow-black/50 backdrop-blur-md bg-blue-600 text-white px-2 py-0.5 rounded-lg hover:bg-blue-700 transition">Search</button>
   </div>
</div>

<section class="lg:col-span-2 backdrop-blur-md rounded-2xl shadow-xs mb-4">
<!-- Result Table -->
  <div id="record" class="tab-content w-full lg:col-span-2 bg-white shadow-blue-600 backdrop-blur-md rounded-2xl shadow-xs">
  <table class="w-full">
    <tbody id="studentRecord"></tbody>
  </table>
</div>

<!-- Edit Table -->
<div id="edits" class="tab-content hidden w-full lg:col-span-2 bg-white shadow-blue-600 backdrop-blur-md rounded-2xl shadow-xs lg:px-4 py-2">
     <form id="editForm" class="p-2 space-y-4">
    <h1 class="text-center text-blue-500 text-2xl lg:text-4xl font-bold m-4">STUDENT BIO</h1>
      <div class="grid grid-cols-3 gap-2 px-2">
      <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">Surname</label>
        <input id="surname" name="surname" type="text" placeholder="Surname"
          class="w-full shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2" required></div>
      
       <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">First Name</label>
        <input id="firstName" name="firstName" type="text" placeholder="First Name"
          class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
          </div>
          
        <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">Other Name</label>
        <input id="otherName" name="otherName" type="text" placeholder="Other name"
          class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
          </div>
           </div>
           
     <div class="grid grid-cols-2 lg:grid lg:grid-cols-4 gap-4 px-2">
     <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">Student ID</label>
       <div class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2"><span id="displayStudentId"></span></div>
          </div>
          
      <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">Year</label>
      <div class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2"><span id="displayYear"></span></div>
          </div>
    
     <div class="flex flex-col gap-1.5">  <label class="block font-medium px-2 mb-1">Class</label>
     <div class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2"><span id="displaySchool"></span></div>
     </div>
        
      <div class="flex flex-col gap-1.5">  <label class="block font-medium px-1.5 mb-1">Term</label>
        <select id="editTerm" name="editTerm" class="shadow-sm shadow-blue-600 backdrop-blur-md rounded-lg focus:ring-blue-500 focus:border-blue-500 p-1.5" required>
        <option value="">Select Term</option>
          <option value="First Term">First Term</option>
          <option value="Second Term">Second Term</option>
          <option value="Third Term">Third Term</option>
        </select></div>
      </div>
        
       <!-- Subjects Form -->
   <h2 class="text-2xl lg:text-3xl mt-8 font-bold mb-4 text-center text-blue-500">SUBJECT RECORDS</h2>
    <div id="courseContainer" class="lg:grid lg:grid-cols-2 lg:gap-4"></div>
        <!-- Buttons -->
      <div class="grid grid-cols-2 lg:grid-cols-5 gap-2 mb-2 px-2 text-white">
  <button type="button" onclick="openRecord()" class="bg-blue-600 rounded shadow-sm py-1 hover:bg-blue-700 transition">Back</button>
  <button type="button" onclick="addRow()" class="bg-blue-600 rounded shadow-sm py-1 hover:bg-blue-700 transition">Add Subject</button>
  
  <button type="button" id="toggleDeleteBtn" onclick="toggleDeleteMode()" class="bg-yellow-600 py-1 rounded shadow-sm hover:bg-yellow-700 transition">Remove Row</button>
  
  <button type="button" onclick="deleteEntireProfile()" class="bg-red-600 py-1 rounded shadow-sm hover:bg-red-700 transition col-span-2 lg:col-span-1">Delete Entire Profile</button>
  
  <button type="button" onclick="handleSubmit()" class="bg-green-600 py-1 rounded shadow-sm hover:bg-green-700 transition col-span-2 lg:col-span-1">Save Changes</button>
</div>
    </form>
 
   </div>
</section>
</div>
</section>

    <div id="toastContainer" class="fixed top-20 right-4 z-50 space-y-2"></div>

<footer class="relative bg-slate-950 py-4 px-6 mt-auto lg:px-8 text-slate-300 text-xs lg:text-md">

     <div class="flex flex-col md:flex-row justify-between items-center gap-2">  <div class="flex justify-center gap-1 md:text-left">&copy;<span id="year"></span><p>School Name. All rights reserved.</p></div>

        <div class="flex flex-wrap justify-center gap-2">
          <a href="privacy-policy.html" class="hover:text-blue-400 transition">
            Privacy Policy
          </a>

          <a href="terms.html" class="hover:text-blue-400 transition">
            Terms & Conditions
          </a>

          <a href="cookies.html" class="hover:text-blue-400 transition">
            Cookie Policy
          </a>

          <a href="accessibility.html" class="hover:text-blue-400 transition">
            Accessibility
          </a>

          <a href="faq.html" class="hover:text-blue-400 transition">
            FAQ
          </a>
        </div>

      </div>
</footer>

<script src="/scripts/edit.js"></script>
<script src="/scripts/script.js"></script>
</body>
</html>
