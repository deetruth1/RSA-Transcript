<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
 
   <link rel="stylesheet" href="../public/css/style.css">
</head>

<body class="scroll-smooth flex flex-col min-h-screen bg-slate-900 text-slate-900">

<div id="bg" class="fixed inset-0 z-0 overflow-hidden">

  <!-- Gradient Layer (animated shift) -->
  <div class="absolute inset-0 bg-white/20 backdrop-blur-lg animate-[bgshift_12s_ease-in-out_infinite]"></div>

  <!-- Soft glow blobs -->
  <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-blue-400/30 blur-3xl rounded-full animate-pulse"></div>
  <div class="absolute bottom-0 -right-40 w-[600px] h-[600px] bg-indigo-400/20 blur-3xl rounded-full animate-pulse"></div>

  <!-- Floating particles -->
  <div class="particles absolute inset-0"></div>
</div>

   <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center backdrop-blur-3xl bg-slate-800 text-green-200 opacity-100 transition-opacity duration-700">
  <div class="flex justify-center items-center h-40">
    <div class="w-64 h-64 lg:w-[500px] lg:h-[500px] shadow-2xl bg-blue-600 shadow-blue-600 backdrop-blur-3xl flex justify-center items-center text-center animate-[morph_8s_ease-in-out_infinite]">
    <img src="svg/img3.png" class="lg:w-full transition-all opacity-40 duration-300 hover:scale-105 animate-pulse">
    </div>
  </div>
</div>
  
 <section id="mainContent" class="hidden flex flex-col opacity-0 transition-opacity duration-700 relative h-[100vh]">
   <div class="mt-25 flex-1">
      <div class="flex justify-center items-center mt-5">
  <div id="carousel" class="relative overflow-hidden w-64 h-64 lg:w-[500px] lg:h-[500px] shadow-2xl bg-blue-600 shadow-blue-600 backdrop-blur-3xl flex justify-center items-center text-center animate-[morph_8s_ease-in-out_infinite] hover:scale-105">

   <div id="carousel-overlay" class="carousel-overlay absolute inset-0 bg-gradient-to-r from-blue-900/70 via-purple-900/40 to-transparent z-10"></div>
   <img src="svg/img1.jpg" class="carousel-image absolute inset-0 object-center opacity-100 transition-opacity duration-700 h-full lg:w-full">
  
   <img src="svg/img3.png" class="carousel-image absolute inset-0 object-cover opacity-0 transition-opacity duration-700 lg:w-full">

 <img src="svg/img2.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full lg:w-full">

  <img src="svg/img3.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full lg:w-full">
     
   <img src="svg/img4.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full lg:w-full">

  <img src="svg/img5.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full lg:w-full">
  
  <img src="svg/img6.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full w-full lg:w-full">
  
  <img src="svg/img7.jpg" class="carousel-image absolute inset-0 object-center opacity-0 transition-opacity duration-700 h-full lg:w-full">
</div>
   </div>
   </div>
   
      <div class="flex justify-center text-center w-full px-6 mb-20 place-items-center">
      <!-- Buttons -->
        <a href="login.html" class="relative w-full lg:max-w-2xl shadow-sm shadow-white backdrop-blur-md bg-blue-600 text-white p-2 lg:py-4 text-3xl lg:text-4xl rounded-xl transition-all duration-300 hover:rounded-full hover:bg-purple-600 hover:shadow-lg hover:scale-95 active:scale-95"><p class="animate-pulse">Sign-in</p></a>
    </div>
</section>
  
  
  
  
   <script src="../public/scripts/script.js"></script> 
</body>
</html>
