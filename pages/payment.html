<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcript Payment Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-bl from-slate-900 to-indigo-950 min-h-screen flex items-center justify-center p-4 text-slate-100">

  <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-md p-6 rounded-2xl border border-slate-800 shadow-xl space-y-6">
    
    <div class="text-center">
      <div class="text-4xl mb-2">💳</div>
      <h2 class="text-2xl font-bold tracking-tight">Secure Payment Gateway</h2>
      <p class="text-xs text-slate-400 mt-1">Processing Official Transcript Order</p>
    </div>

    <div class="bg-slate-950/60 rounded-xl p-4 border border-slate-800/80 space-y-3 text-sm">
      <div class="flex justify-between border-b border-slate-800 pb-2">
        <span class="text-slate-400">Student ID:</span>
        <span id="summaryStudentId" class="font-mono font-bold text-indigo-400">-</span>
      </div>
      <div class="flex justify-between border-b border-slate-800 pb-2">
        <span class="text-slate-400">Processing Scope:</span>
        <span class="font-medium text-slate-200">Full Academic Record</span>
      </div>
      <div class="flex justify-between pt-1 text-base font-semibold">
        <span>Amount Due:</span>
        <span class="text-green-400">₦15,000.00</span>
      </div>
    </div>

    <div class="space-y-3 pt-2">
      <button onclick="simulateSuccessfulPayment()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-[0.98]">
        Simulate Successful Payment
      </button>
      
      <button onclick="cancelPayment()" class="w-full bg-transparent hover:bg-slate-800 text-slate-400 hover:text-slate-200 text-sm font-medium py-2 rounded-xl transition">
        Cancel & Go Back
      </button>
    </div>

  </div>

  <script>
    // Load student data onto the payment screen summary window
    document.addEventListener("DOMContentLoaded", () => {
      const metadata = JSON.parse(localStorage.getItem("pendingTranscriptRequest"));
      if (metadata && metadata.studentId) {
        document.getElementById("summaryStudentId").textContent = metadata.studentId;
      } else {
        alert("No active pending transcript order found.");
        window.location.href = "/student";
      }
    });

    // Hook to mock a successful checkout loop
    function simulateSuccessfulPayment() {
      localStorage.setItem("paymentSuccess", "true");
      localStorage.setItem("paymentReference", "REF-" + Math.floor(100000 + Math.random() * 900000));
      
      // Redirect back to your student dashboard route
      window.location.href = "/student"; 
    }

    function cancelPayment() {
      localStorage.removeItem("pendingTranscriptRequest");
      window.location.href = "/student";
    }
  </script>

</body>
</html>
